brand_name: "LOKIN"

app:
  name: "Lokin"
  one_line: "Find your gym partner. Social fitness app for accountability and community."
  store_url: "https://lokin.app/download"
  cta_bridge_phrase: "Working out alone is willpower roulette. Lokin finds the partner that makes the workout inevitable."

icp:
  audience: "fitness-active people 18-35 who want workout partners, accountability, and community"
  jtbd: "Stop missing gym sessions because of motivation gaps; find a partner who makes showing up automatic"
  fears:
    - "another month of skipped workouts"
    - "training alone without progress"
    - "social-fitness FOMO without entry point"
  internal_monologue:
    - "I want a workout partner without joining a clique"
    - "I'm tired of streaks broken by life"

voice:
  principles:
    - "Energetic and motivating without bro-science clichés"
    - "Real talk: practical mechanisms, not hype"
    - "Community-focused — partnership, not competition"
  banned_words:
    - "no pain no gain"
    - "rise and grind"
    - "beast mode"
    - bossbabe
    - "level up"
    - "crush it"
    - "10x"
    - "let's gooooo"
  voice_mode:
    default: guide

type_pairings:
  default: proximanova-sailors

publishing_mode: testing

design:
  colors:
    primary: "#FF6B35"
    secondary: "#1A1A2E"
    accent: "#16213E"
    background: "#0F0F1A"
    text: "#FFFFFF"
    text_muted: "#A0A0B8"
  fonts:
    heading: "Proxima Nova"
    body: "Proxima Nova"
  visual_mood: "Dynamic gym energy, bold lighting, motivational intensity, modern sport aesthetic — but grounded, not bro-coded."

narrative:
  slide_count: { min: 5, max: 9, sweet_spot: 7 }
  variety_rules:
    - "no repeat voice_mode in last 3 carousels"

product:
  hashtags:
    medium_density:
      - "#gymtok"
      - "#fitness"
      - "#workoutpartner"
      - "#gymmotivation"
      - "#accountability"
      - "#fitnessjourney"
      - "#fitfam"
      - "#gymcommunity"
      - "#workout"
      - "#fyp"
    niche:
      - "#liftingpartner"
      - "#gymduo"
      - "#progressivetrainingpartners"
      - "#gymaccountability"
      - "#workoutbuddy"
      - "#fitnessdiscipline"
      - "#strengthtraining"
      - "#trainwithme"
    avoid:
      - "#gymrats"
      - "#hustleculture"
      - "#noexcuses"
      - "#bossbabe"
      - "#alphagym"
    stack_rule: "8-12 total: 2 broad / 4 niche / 3 audience-or-pillar / 2 branded"

brand_lines_in_sand:
  - "never use bro-coded vocabulary"
  - "never frame fitness as moral failure / shame"
  - "never imply solo work is weakness"

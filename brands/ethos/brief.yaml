brand_name: "ETHOS"

app:
  name: "ETHOS"
  one_line: "Daily discipleship for young Christian men 18-25."
  store_url: "https://ethos.app/download"
  cta_bridge_phrase: "Theory without execution stays theory. ETHOS automates the protocol."

icp:
  audience: "young Christian men 18-25"
  jtbd: "Build Christ-centered identity through daily disciplined practice"
  fears:
    - "drifting back to old patterns"
    - "performing faith without depth"
    - "isolation in spiritual formation"
  internal_monologue:
    - "I want to be the kind of man my future children will respect"
    - "I'm tired of streaks I cannot keep"

voice:
  principles:
    - "Direct without being preachy"
    - "Peer who has been there, not parent"
    - "Anchored in Scripture, weaponized for action"
  # Brand-specific hard-reject words/phrases — ETHOS-specific list (NOT universal infrastructure).
  # Mechanical regex check at strategist + critic stages.
  banned_words:
    - manifest
    - "the universe rewards"
    - blessed
    - abundance
    - bestie
    - "dive in"
    - "game-changer"
    - "level up"
    - grind
    - bossbabe
    - "hold space"
    - alignment
  voice_mode:
    default: guide

# type_pairings field is optional. ETHOS sets a default anchor; all 6 library
# pairings remain available for the strategist to pick from per topic.
type_pairings:
  default: recoleta-berthold

publishing_mode: testing

design:
  colors:
    primary: "#A67C2E"
    secondary: "#C8973E"
    accent: "#C4501A"
    background: "#0A0A0A"
    text: "#F0E6D6"
    text_muted: "#6B6B6B"
  fonts:
    heading: "Recoleta"
    body: "Recoleta"
  visual_mood: "Obsidian and gold. Warm metallic gold catching candlelight on ink-black. Editorial / cinematic. A weapon picked up for the day, not a content library browsed."

narrative:
  slide_count: { min: 5, max: 9, sweet_spot: 7 }
  variety_rules:
    # Optional opt-in; remove any you don't want enforced.
    - "no repeat voice_mode in last 3 carousels"

product:
  hashtags:
    medium_density:
      - "#christiantiktok"
      - "#christianmen"
      - "#faith"
      - "#jesus"
      - "#bible"
      - "#dailyverse"
      - "#christianlife"
      - "#discipleship"
      - "#manhood"
      - "#fyp"
    niche:
      - "#biblicalmasculinity"
      - "#youngchristian"
      - "#christianidentity"
      - "#mensministry"
      - "#bibledaily"
      - "#wisdom"
      - "#integrity"
      - "#character"
      - "#habits"
      - "#morningrituals"
    avoid:
      - "#blessed"
      - "#prosperity"
      - "#manifest"
      - "#alpha"
      - "#sigma"
      - "#hustleculture"
    stack_rule: "8-12 total: 2 broad / 4 niche / 3 audience-or-pillar / 2 branded"

brand_lines_in_sand:
  - "never use prosperity-gospel framing"
  - "never invoke shame as motivator"
  - "never compare brand favorably to other Christian apps"

name: Render and Publish Carousels

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  render-carousels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so git diff operates correctly

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium Browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright Render & Upload
        env:
          CI_COMMIT_BEFORE_SHA: ${{ github.event.before || github.event.pull_request.base.sha }}
          CI_COMMIT_SHA: ${{ github.sha || github.event.pull_request.head.sha }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: npm run render

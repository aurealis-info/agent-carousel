# Universal goal-tagged font pairing library — all Google Fonts (commercial-safe).
# Strategist picks one primary pairing per carousel + optional emphasis font (any pairing).
# All pairings are universally available to every brand by default.
#
# `source: google` — fonts loaded via Google Fonts @import URL. No local files.
# `families` is the list of family-spec strings used to build the Google Fonts URL,
# e.g. "Playfair+Display:ital,wght@0,700;0,800;0,900" — see https://fonts.google.com.

pairings:
  - id: avantgarde-cooper
    heading:
      family: "Bowlby One"
      weights: [400]
      source: google
      families: ["Bowlby+One"]
    body:
      family: "Inter"
      weights: [400, 500, 600, 700]
      source: google
      families: ["Inter:wght@400;500;600;700"]
    goals: [nostalgia, confidence, retro-modern, bold-claims]
    emotions: [warm, knowing, punchy, lived-in]
    vibe: "70s editorial confidence. Bowlby is the Cooper-Black-style chunky punch; Inter is the structure."
    pairs_well_with: [lifestyle, consumer-brands, fashion-adjacent, hospitality, food-and-drink]
    references: [vintage-Esquire, mid-century-New-Yorker]
    license: "Both fonts are open-licensed via Google Fonts — commercial-safe."
    license_status: commercial-safe


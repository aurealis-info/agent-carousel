<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 things God builds in a man who shows up — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; font-family: system-ui, sans-serif; padding: 32px; }
    h1 { color: #888; font-size: 14px; font-weight: 400; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(4, 270px); gap: 16px; }
    .cell { display: flex; flex-direction: column; gap: 8px; }
    .cell span { color: #555; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; }
    iframe {
      width: 270px;
      height: 337px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      width: 1080px;
      height: 1350px;
      display: block;
    }
    .frame-wrap {
      width: 270px;
      height: 337px;
      overflow: hidden;
      position: relative;
    }
    .frame-wrap iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1080px;
      height: 1350px;
      transform: scale(0.25);
      transform-origin: top left;
      border: none;
    }
  </style>
</head>
<body>
  <h1>Review — 5 things God builds in a man who shows up — 07 slides</h1>
  <div class="grid">
    <div class="cell">
      <div class="frame-wrap"><iframe src="slide-01.html"></iframe></div>
      <span>01 / Hook</span>
    </div>
    <div class="cell">
      <div class="frame-wrap"><iframe src="slide-02.html"></iframe></div>
      <span>02 / Trait 1</span>
    </div>
    <div class="cell">
      <div class="frame-wrap"><iframe src="slide-03.html"></iframe></div>
      <span>03 / Trait 2</span>
    </div>
    <div class="cell">
      <div class="frame-wrap"><iframe src="slide-04.html"></iframe></div>
      <span>04 / Trait 3</span>
    </div>
    <div class="cell">
      <div class="frame-wrap"><iframe src="slide-05.html"></iframe></div>
      <span>05 / Trait 4</span>
    </div>
    <div class="cell">
      <div class="frame-wrap"><iframe src="slide-06.html"></iframe></div>
      <span>06 / Trait 5</span>
    </div>
    <div class="cell">
      <div class="frame-wrap"><iframe src="slide-07.html"></iframe></div>
      <span>07 / CTA</span>
    </div>
  </div>
</body>
</html>

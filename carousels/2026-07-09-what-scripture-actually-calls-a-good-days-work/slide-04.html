    <h2 class="step-title">Rest isn't the enemy of the work.</h2>
    <p class="step-body">God worked six days and stopped on the seventh, not because He was tired, but because stopping was part of the design. A man who never rests isn't more faithful. He just doesn't trust anyone to hold it while he sleeps.</p>

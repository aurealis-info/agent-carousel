<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 Traits of the Man Who Walks Humbly — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      padding: 32px;
    }
    h1 {
      color: #D4B668;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    p.meta {
      color: #888;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 270px);
      gap: 24px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      color: #D4B668;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    iframe {
      width: 270px;
      height: 338px;
      border: none;
      display: block;
      transform-origin: top left;
      transform: scale(0.25);
      width: 1080px;
      height: 1350px;
      pointer-events: none;
    }
    .frame {
      width: 270px;
      height: 337px;
      overflow: hidden;
      border: 1px solid #333;
    }
  </style>
</head>

    <div class="cell">

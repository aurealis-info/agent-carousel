    <h2 class="step-title">Don't go around. Go to them.</h2>
    <p class="step-body">The man who vents behind someone's back and never says it to their face isn't a peaceful man. He's an avoidant one. Matthew 18:15 is clear: go to him. That means you pick up the phone or show up at the door — not the group chat.</p>

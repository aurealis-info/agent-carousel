<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 Disciplines — Review Grid</title>
  <style>
    * { box-sizing: border-box; }
    body {
      background: #161616;
      margin: 0;
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      font-family: -apple-system, sans-serif;
    }
    .card {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .frame {
      width: 360px;
      height: 450px;
      overflow: hidden;
      position: relative;
      border: 1px solid #333;
    }
    .frame iframe {
      width: 1080px;
      height: 1350px;
      transform: scale(0.3333);
      transform-origin: 0 0;
      border: 0;
      pointer-events: none;
    }
    .label {
      color: #666;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="frame"><iframe src="slide-01.html"></iframe></div>
    <div class="label">01 / 07 — Hook</div>
  </div>
  <div class="card">
    <div class="frame"><iframe src="slide-02.html"></iframe></div>
    <div class="label">02 / 07 — Discipline 1</div>
  </div>
  <div class="card">
    <div class="frame"><iframe src="slide-03.html"></iframe></div>
    <div class="label">03 / 07 — Discipline 2</div>
  </div>
  <div class="card">
    <div class="frame"><iframe src="slide-04.html"></iframe></div>
    <div class="label">04 / 07 — Discipline 3</div>
  </div>
  <div class="card">
    <div class="frame"><iframe src="slide-05.html"></iframe></div>
    <div class="label">05 / 07 — Discipline 4</div>
  </div>
  <div class="card">
    <div class="frame"><iframe src="slide-06.html"></iframe></div>
    <div class="label">06 / 07 — Discipline 5</div>
  </div>
  <div class="card">
    <div class="frame"><iframe src="slide-07.html"></iframe></div>
    <div class="label">07 / 07 — CTA</div>
  </div>
</body>
</html>

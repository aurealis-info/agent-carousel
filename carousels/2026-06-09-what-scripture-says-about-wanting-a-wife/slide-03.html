    <h2 class="step-title">"He who finds" — read it again</h2>
    <div class="step-body">
      Proverbs 18:22 says <em>he who finds a wife finds a good thing.</em> The subject is a man who was busy going somewhere — and found her along the way. Not a man who made finding her the whole trip.
      <br><br>
      The verse is about a man in motion, not a man in waiting.

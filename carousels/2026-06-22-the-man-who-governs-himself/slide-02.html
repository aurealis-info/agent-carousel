    <h2 class="step-title">No master, or the wrong one.</h2>
    <p class="step-body">The man who can't say no to himself doesn't have freedom. He has a leash. Whatever he can't resist — the feed, the cravings, the approval — that thing is running him. He calls it living how he wants. It's actually living how his impulses want.</p>

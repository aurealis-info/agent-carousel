    <h2 class="step-title">The fruit comes before the feeling.</h2>
    <p class="step-body">You don't feel like praying. You don't feel like opening the Word, getting up, going to the gym. The man of God does it anyway. And the settledness, the clarity — follows the act. Almost always. You learn to act first, and let the feeling catch up.</p>

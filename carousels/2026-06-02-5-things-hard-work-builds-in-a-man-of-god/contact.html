<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 Things Hard Work Builds — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      padding: 40px;
      font-family: -apple-system, sans-serif;
    }
    h1 {
      color: #D4B668;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    iframe {
      width: 100%;
      aspect-ratio: 1080 / 1350;
      border: 1px solid #333;
      transform-origin: top left;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Review — 5 things hard work builds in a man of God</h1>
  <div class="grid">
    <div class="cell">
      <div class="label">01 / Hook</div>
      <iframe src="slide-01.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <div class="label">02 / Truth 1</div>
      <iframe src="slide-02.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <div class="label">03 / Truth 2</div>
      <iframe src="slide-03.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <div class="label">04 / Truth 3</div>
      <iframe src="slide-04.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <div class="label">05 / Truth 4</div>
      <iframe src="slide-05.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <div class="label">06 / Truth 5</div>
      <iframe src="slide-06.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <div class="label">07 / CTA</div>
      <iframe src="slide-07.html" scrolling="no"></iframe>
    </div>
  </div>
</body>
</html>

    <h2 class="step-title">Ambition without surrender is just anxiety.</h2>
    <p class="step-body">The man who has to win to feel okay isn&rsquo;t ambitious &mdash; he&rsquo;s desperate. Driving hard toward something you can&rsquo;t let go of is bondage, not hustle. Surrender doesn&rsquo;t kill your drive. It frees you to work without being <span class="underline">owned</span> by the outcome.</p>

    <h2 class="step-title">The verse gets hijacked.</h2>
    <p class="step-body">Ecclesiastes 4 gets read at weddings so often that men assume it's about a wife. Read the actual lines: if one falls, the other lifts him up. Woe to the one who falls with <span class="underline">no one to help him up</span>. That's not romance. That's a warning about being alone.</p>

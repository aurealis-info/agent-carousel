    <h2 class="step-title">Solomon wrote it for weight, not sentiment.</h2>
    <p class="step-body">A cord of three strands is not quickly broken. He's describing a rope, something built to hold weight under strain, not a feeling. A man alone is a single strand. He snaps exactly where you'd expect him to.</p>

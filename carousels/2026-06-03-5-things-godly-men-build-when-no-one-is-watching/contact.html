<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 Things Godly Men Build When No One Is Watching — Contact Sheet</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: #161616;
      color: #f2ead9;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    }
    header {
      padding: 32px 48px 8px;
    }
    h1 {
      margin: 0 0 6px 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .meta {
      font-size: 13px;
      opacity: 0.6;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      padding: 32px 48px 64px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .label {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: 0.55;
    }
    .scaler {
      width: 100%;
      aspect-ratio: 1080 / 1350;
      overflow: hidden;
      position: relative;
      background: #f2ead9;
      box-shadow: 0 18px 40px rgba(0,0,0,0.5);
    }
    .scaler iframe {
      width: 1080px;
      height: 1350px;
      border: 0;
      transform-origin: 0 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>ETHOS — 5 Things Godly Men Build When No One Is Watching</h1>
    <div class="meta">Light · Numbered List · The Work · 7 slides · Draft 2026-06-03</div>
  </header>
  <div class="grid">
    <div class="cell"><div class="scaler"><iframe src="slide-01.html"></iframe></div><div class="label">01 · Hook</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-02.html"></iframe></div><div class="label">02 · Discipline 1</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-03.html"></iframe></div><div class="label">03 · Discipline 2</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-04.html"></iframe></div><div class="label">04 · Discipline 3</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-05.html"></iframe></div><div class="label">05 · Discipline 4</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-06.html"></iframe></div><div class="label">06 · Discipline 5</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-07.html"></iframe></div><div class="label">07 · CTA</div></div>
  </div>
  <script>
    function fit() {
      document.querySelectorAll('.scaler').forEach(el => {
        const w = el.clientWidth;
        const scale = w / 1080;
        const iframe = el.querySelector('iframe');
        iframe.style.transform = 'scale(' + scale + ')';
        iframe.style.transformOrigin = '0 0';
      });
    }
    window.addEventListener('load', fit);
    window.addEventListener('resize', fit);
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Review: 5 Things a Man of God Does Before Noon</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      padding: 40px;
    }
    h1 {
      color: #d4b668;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    iframe {
      width: 100%;
      aspect-ratio: 1080 / 1350;
      border: 1px solid #333;
      transform-origin: top left;
      pointer-events: none;
    }
    .iframe-wrap {
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    /* Scale each 1080×1350 slide down to fit the grid column */
    .iframe-wrap iframe {
      width: 1080px;
      height: 1350px;
      transform: scale(var(--s));
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <h1>Review deck — 5 things a man of god does before noon</h1>
  <div class="grid" id="grid"></div>

  <script>
    const slides = [
      'slide-01.html',
      'slide-02.html',
      'slide-03.html',
      'slide-04.html',
      'slide-05.html',
      'slide-06.html',
      'slide-07.html',
    ];
    const grid = document.getElementById('grid');
    const colWidth = (window.innerWidth - 80 - 60) / 4; // 4 cols, 40px side padding, 3×20px gaps
    const scale = colWidth / 1080;

    slides.forEach((src, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';

      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = src.replace('.html', '');

      const wrap = document.createElement('div');
      wrap.className = 'iframe-wrap';
      wrap.style.height = (1350 * scale) + 'px';

      const frame = document.createElement('iframe');
      frame.src = src;
      frame.style.transform = `scale(${scale})`;

      wrap.appendChild(frame);
      cell.appendChild(label);
      cell.appendChild(wrap);
      grid.appendChild(cell);
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Review Grid — 5 traits God builds before he sends her</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    h1 {
      color: #d4b668;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .label {
      color: #666;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .iframe-wrap {
      width: 270px;
      height: 337px;
      overflow: hidden;
      position: relative;
      border: 1px solid #333;
    }
    .iframe-wrap iframe {
      width: 1080px;
      height: 1350px;
      border: none;
      transform: scale(0.25);
      transform-origin: top left;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Review — 5 traits God builds before he sends her (light, 7 slides)</h1>
  <div class="grid">
    <div class="cell">
      <div class="label">01 / 07 — Hook</div>
      <div class="iframe-wrap"><iframe src="slide-01.html"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">02 / 07 — Trait 1</div>
      <div class="iframe-wrap"><iframe src="slide-02.html"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">03 / 07 — Trait 2</div>
      <div class="iframe-wrap"><iframe src="slide-03.html"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">04 / 07 — Trait 3</div>
      <div class="iframe-wrap"><iframe src="slide-04.html"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">05 / 07 — Trait 4</div>
      <div class="iframe-wrap"><iframe src="slide-05.html"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">06 / 07 — Trait 5</div>
      <div class="iframe-wrap"><iframe src="slide-06.html"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">07 / 07 — CTA</div>
      <div class="iframe-wrap"><iframe src="slide-07.html"></iframe></div>
    </div>
  </div>
</body>
</html>

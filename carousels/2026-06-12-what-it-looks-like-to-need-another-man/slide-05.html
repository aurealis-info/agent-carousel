    <h2 class="step-title">Isolation isn't <span class="circled">toughness</span>.</h2>
    <p class="step-body">The man who white-knuckles his sin alone isn't strong. He's just alone — and alone is where men rot. "Confess your sins to one another, that you may be healed." — James 5:16. The light gets in where you let another man in.</p>

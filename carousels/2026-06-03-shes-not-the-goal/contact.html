<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — She's not the goal — Review Grid</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    h1 {
      color: #D4B668;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin: 0 0 32px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 270px);
      gap: 24px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    iframe {
      width: 270px;
      height: 338px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      width: 1080px;
      height: 1350px;
      pointer-events: none;
    }
    .frame {
      width: 270px;
      height: 338px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>She's not the goal — Review</h1>
  <div class="grid">
    <div class="cell">
      <div class="label">01 / Hook</div>
      <div class="frame"><iframe src="slide-01.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">02 / Step 1</div>
      <div class="frame"><iframe src="slide-02.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">03 / Step 2</div>
      <div class="frame"><iframe src="slide-03.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">04 / Step 3</div>
      <div class="frame"><iframe src="slide-04.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">05 / Step 4</div>
      <div class="frame"><iframe src="slide-05.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <div class="label">06 / CTA</div>
      <div class="frame"><iframe src="slide-06.html" scrolling="no"></iframe></div>
    </div>
  </div>
</body>
</html>

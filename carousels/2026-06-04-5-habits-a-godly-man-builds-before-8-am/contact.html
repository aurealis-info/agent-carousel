<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 habits a godly man builds before 8 AM — Review Grid</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      background: #161616;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    h1 {
      color: #d4b668;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 24px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 270px);
      gap: 20px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      color: #ffffff;
      opacity: 0.5;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    iframe {
      width: 270px;
      height: 338px;
      border: 1px solid rgba(255,255,255,0.12);
      transform-origin: top left;
      transform: scale(0.25);
      width: 1080px;
      height: 1350px;
      pointer-events: none;
    }
    .frame-wrap {
      width: 270px;
      height: 338px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <h1>ETHOS — 5 habits a godly man builds before 8 AM — Review</h1>
  <div class="grid">
    <div class="cell">
      <div class="label">01 / Hook</div>
      <div class="frame-wrap">
        <iframe src="slide-01.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">02 / Habit 1</div>
      <div class="frame-wrap">
        <iframe src="slide-02.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">03 / Habit 2</div>
      <div class="frame-wrap">
        <iframe src="slide-03.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">04 / Habit 3</div>
      <div class="frame-wrap">
        <iframe src="slide-04.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">05 / Habit 4</div>
      <div class="frame-wrap">
        <iframe src="slide-05.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">06 / Habit 5</div>
      <div class="frame-wrap">
        <iframe src="slide-06.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">07 / CTA</div>
      <div class="frame-wrap">
        <iframe src="slide-07.html" scrolling="no"></iframe>
      </div>
    </div>
  </div>
</body>
</html>

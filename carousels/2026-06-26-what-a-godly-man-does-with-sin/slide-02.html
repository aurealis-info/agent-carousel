    <h2 class="step-title">You're treating it like a volume knob.</h2>
    <p class="step-body">Most men try to turn the sin down. Get it to a manageable level. Read more, feel better, drift back. Repeat the cycle for years. Scripture uses a different word for this approach. The word is <span class="underline">death.</span> Not reduction. Mortification.</p>

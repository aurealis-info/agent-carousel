<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Before You Lead Anyone — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; padding: 40px; font-family: sans-serif; }
    h1 { color: #D4B668; font-size: 18px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 32px; }
    .grid { display: flex; flex-wrap: wrap; gap: 24px; }
    .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .cell span { color: #888; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
    iframe {
      width: 270px;
      height: 337px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      /* display at 270×337 but render the 1080×1350 content at 25% */
    }
    .iframe-wrap {
      width: 270px;
      height: 337px;
      overflow: hidden;
      position: relative;
    }
    .iframe-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 1080px;
      height: 1350px;
      transform: scale(0.25);
      transform-origin: top left;
      border: none;
    }
  </style>
</head>
<body>
  <h1>Before You Lead Anyone — Review Grid</h1>
  <div class="grid">
    <div class="cell">
      <div class="iframe-wrap"><iframe src="slide-01.html"></iframe></div>
      <span>01 Hook</span>
    </div>
    <div class="cell">
      <div class="iframe-wrap"><iframe src="slide-02.html"></iframe></div>
      <span>02 Trait 1</span>
    </div>
    <div class="cell">
      <div class="iframe-wrap"><iframe src="slide-03.html"></iframe></div>
      <span>03 Trait 2</span>
    </div>
    <div class="cell">
      <div class="iframe-wrap"><iframe src="slide-04.html"></iframe></div>
      <span>04 Trait 3</span>
    </div>
    <div class="cell">
      <div class="iframe-wrap"><iframe src="slide-05.html"></iframe></div>
      <span>05 Trait 4</span>
    </div>
    <div class="cell">
      <div class="iframe-wrap"><iframe src="slide-06.html"></iframe></div>
      <span>06 CTA</span>
    </div>
  </div>
</body>
</html>

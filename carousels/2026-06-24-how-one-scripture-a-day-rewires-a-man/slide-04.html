    <h2 class="step-title">Write one line down.</h2>
    <p class="step-body">What you write, you remember. What you only read, you forget by noon. One line — in a journal, a notes app, a sticky note on your mirror. The line that hit you. The one you don't want to lose. Now it <span class="underline">travels with you</span> through the day instead of staying on the page.</p>

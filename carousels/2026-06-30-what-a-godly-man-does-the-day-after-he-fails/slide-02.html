    <h2 class="step-title">Own it before you give it.</h2>
    <p class="step-body">There's a version of "I gave it to God" that skips accountability. That's not repentance — it's a transfer of blame. First: look at what actually happened. Own the exact thing. Then give it to God. He can work with an honest man. He doesn't need you to spin it.</p>

    <h2 class="step-title">God doesn't waste the wreckage.</h2>
    <p class="step-body">Look at who God used. Moses killed a man. Peter denied Christ three times. David's worst chapters are some of Scripture's most honest. God builds men for real things through real failures. Don't waste the lesson by running from what happened.</p>

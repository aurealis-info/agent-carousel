<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Review Grid — 5 Things God Builds In A Man Who Keeps Showing Up</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin: 0 0 24px 0;
      opacity: 0.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .cell { display: flex; flex-direction: column; gap: 8px; }
    .scaler {
      width: 100%;
      aspect-ratio: 1080 / 1350;
      overflow: hidden;
      position: relative;
      border: 1px solid #333;
    }
    .scaler iframe {
      width: 1080px;
      height: 1350px;
      border: 0;
      transform-origin: top left;
      transform: scale(var(--scale, 0.22));
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.5;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.scaler').forEach(function (el) {
        var w = el.offsetWidth;
        el.style.setProperty('--scale', w / 1080);
      });
    });
  </script>
</head>
<body>
  <h1>Review Grid — 5 Things God Builds In A Man Who Keeps Showing Up</h1>
  <div class="grid">
    <div class="cell"><div class="scaler"><iframe src="slide-01.html"></iframe></div><div class="label">01 · Hook</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-02.html"></iframe></div><div class="label">02 · Step 1</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-03.html"></iframe></div><div class="label">03 · Step 2</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-04.html"></iframe></div><div class="label">04 · Step 3</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-05.html"></iframe></div><div class="label">05 · Step 4</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-06.html"></iframe></div><div class="label">06 · Step 5</div></div>
    <div class="cell"><div class="scaler"><iframe src="slide-07.html"></iframe></div><div class="label">07 · CTA</div></div>
  </div>
</body>
</html>

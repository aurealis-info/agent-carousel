    <h2 class="step-title">Treat it like it will <span class="underline">kill you</span>.</h2>
    <p class="step-body">Because it will. Not all at once, maybe. But sin left alive doesn't stay the same size. It grows. It shapes the man. It narrows what he can become. The man who fights sin like it matters is the man who stays free. Half-measures just delay the damage.</p>

    <h2 class="step-title">Confess it to another man.</h2>
    <p class="step-body">James 5:16 isn't a suggestion. "Confess your sins to one another, that you may be healed." The thing you're ashamed to say out loud is the thing that still owns you. Bring it into the light. Find one man who can hold it. The grip breaks there, not in private.</p>

    <h2 class="step-title">Humility is security, not smallness</h2>
    <div class="step-body">
      <p>Humble men aren't soft. They're so grounded they don't need to compete. Arrogance is fear with a loud voice. Humility is knowing who you are without needing the room to agree.</p>
      <p>The secure man doesn't have to prove anything. He already knows.</p>

    <h2 class="step-title">Confession is the first killing blow.</h2>
    <p class="step-body">What stays hidden keeps its power. The moment you say it out loud to one man who isn't going anywhere, it loses the thing that fed it: your silence. That's not a metaphor. <span class="underline">James 5:16</span> promises healing follows the confession, not the other way around.</p>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Humility — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; padding: 40px; font-family: sans-serif; }
    h1 { color: #d4b668; font-size: 18px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .frame { position: relative; }
    .label { color: #888; font-size: 12px; margin-bottom: 8px; letter-spacing: 0.1em; text-transform: uppercase; }
    iframe {
      width: 360px;
      height: 450px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.333);
      display: block;
    }
    .iframe-wrapper {
      width: 120px;
      height: 150px;
      overflow: hidden;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h1>Review — What Scripture actually says about humility</h1>
  <div class="grid">
    <div class="frame">
      <div class="label">01 / Hook</div>
      <div class="iframe-wrapper">
        <iframe src="slide-01.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">02 / Step 1</div>
      <div class="iframe-wrapper">
        <iframe src="slide-02.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">03 / Step 2</div>
      <div class="iframe-wrapper">
        <iframe src="slide-03.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">04 / Step 3</div>
      <div class="iframe-wrapper">
        <iframe src="slide-04.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">05 / Step 4</div>
      <div class="iframe-wrapper">
        <iframe src="slide-05.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">06 / CTA</div>
      <div class="iframe-wrapper">
        <iframe src="slide-06.html" scrolling="no"></iframe>
      </div>
    </div>
  </div>
</body>
</html>

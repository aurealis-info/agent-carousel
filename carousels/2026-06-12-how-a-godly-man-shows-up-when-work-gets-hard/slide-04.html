    <h2 class="step-title">Finish before you rest.</h2>
    <p class="step-body">Rest isn't a reward for feeling tired — it's the rhythm built into creation. Work fully, rest fully. But you can't Sabbath properly if you can't finish. The discipline of completion is what makes the rest real. Quitting early robs both.</p>

    <h2 class="step-title">Start With One Hour</h2>
    <p class="step-body">Not a digital sabbath. Not a cleanse. One hour, today, phone face-down. Read a chapter. Sit in silence. Pray out loud if you have to — that's fine. Then decide tomorrow. One hour is the discipline. Do it long enough, and it becomes the <span class="underline">man.</span></p>

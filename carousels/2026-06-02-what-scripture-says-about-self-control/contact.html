<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Review Grid — What Scripture Says About Self-Control</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; background: #1a1a1a; font-family: sans-serif; }
    h1 { color: #d4b668; font-size: 18px; letter-spacing: 0.1em; text-transform: uppercase; margin: 0 0 24px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .slide-wrap { background: #111; border: 1px solid #333; }
    .slide-wrap iframe {
      width: 1080px;
      height: 1350px;
      transform-origin: top left;
      transform: scale(0.28);
      display: block;
      border: none;
    }
    .slide-wrap { width: calc(1080px * 0.28); height: calc(1350px * 0.28); overflow: hidden; }
    .label { color: #888; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 6px 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>What Scripture Says About Self-Control — 6 slides</h1>
  <div class="grid">
    <div class="slide-wrap">
      <iframe src="slide-01.html"></iframe>
      <div class="label">01 — Hook</div>
    </div>
    <div class="slide-wrap">
      <iframe src="slide-02.html"></iframe>
      <div class="label">02 — Step 1</div>
    </div>
    <div class="slide-wrap">
      <iframe src="slide-03.html"></iframe>
      <div class="label">03 — Step 2</div>
    </div>
    <div class="slide-wrap">
      <iframe src="slide-04.html"></iframe>
      <div class="label">04 — Step 3</div>
    </div>
    <div class="slide-wrap">
      <iframe src="slide-05.html"></iframe>
      <div class="label">05 — Step 4</div>
    </div>
    <div class="slide-wrap">
      <iframe src="slide-06.html"></iframe>
      <div class="label">06 — CTA</div>
    </div>
  </div>
</body>
</html>

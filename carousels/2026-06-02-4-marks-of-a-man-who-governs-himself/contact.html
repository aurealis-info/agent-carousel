<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 4 Marks of a Man Who Governs Himself — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      font-family: -apple-system, sans-serif;
      padding: 32px;
    }
    h1 {
      color: #d4b668;
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    iframe {
      width: 100%;
      aspect-ratio: 1080 / 1350;
      border: 1px solid #333;
      transform-origin: top left;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Review — 4 marks of a man who governs himself</h1>
  <div class="grid">
    <div class="cell">
      <span class="label">01 / 06 — Hook</span>
      <iframe src="slide-01.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <span class="label">02 / 06 — Mark 1</span>
      <iframe src="slide-02.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <span class="label">03 / 06 — Mark 2</span>
      <iframe src="slide-03.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <span class="label">04 / 06 — Mark 3</span>
      <iframe src="slide-04.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <span class="label">05 / 06 — Mark 4</span>
      <iframe src="slide-05.html" scrolling="no"></iframe>
    </div>
    <div class="cell">
      <span class="label">06 / 06 — CTA</span>
      <iframe src="slide-06.html" scrolling="no"></iframe>
    </div>
  </div>
</body>
</html>

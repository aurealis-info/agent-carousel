<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Review Grid — 5 Things a Man of God Builds in His 20s</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px;
      background: #111;
      font-family: -apple-system, sans-serif;
    }
    h1 {
      color: #D4B668;
      font-size: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 32px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 270px);
      gap: 20px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .cell label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    iframe {
      width: 270px;
      height: 338px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      width: 1080px;
      height: 1350px;
      border-radius: 2px;
    }
    .frame {
      width: 270px;
      height: 338px;
      overflow: hidden;
      border: 1px solid #333;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>Review — 5 things a man of God builds in his 20s</h1>
  <div class="grid">
    <div class="cell">
      <label>01 Hook</label>
      <div class="frame"><iframe src="slide-01.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <label>02 Step 1</label>
      <div class="frame"><iframe src="slide-02.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <label>03 Step 2</label>
      <div class="frame"><iframe src="slide-03.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <label>04 Step 3</label>
      <div class="frame"><iframe src="slide-04.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <label>05 Step 4</label>
      <div class="frame"><iframe src="slide-05.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <label>06 Step 5</label>
      <div class="frame"><iframe src="slide-06.html" scrolling="no"></iframe></div>
    </div>
    <div class="cell">
      <label>07 CTA</label>
      <div class="frame"><iframe src="slide-07.html" scrolling="no"></iframe></div>
    </div>
  </div>
</body>
</html>

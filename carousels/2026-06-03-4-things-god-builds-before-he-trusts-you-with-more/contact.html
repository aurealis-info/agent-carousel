<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 4 Things God Builds — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    h1 {
      color: #D4B668;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .frame {
      position: relative;
    }
    .label {
      color: #999;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    iframe {
      width: 1080px;
      height: 1350px;
      border: none;
      transform: scale(0.32);
      transform-origin: top left;
      display: block;
    }
    .iframe-wrap {
      width: calc(1080px * 0.32);
      height: calc(1350px * 0.32);
      overflow: hidden;
    }
  </style>
</head>
<body>
  <h1>Review — 4 Things God Builds Before He Trusts You With More</h1>
  <div class="grid">
    <div class="frame">
      <div class="label">01 / Hook</div>
      <div class="iframe-wrap"><iframe src="slide-01.html"></iframe></div>
    </div>
    <div class="frame">
      <div class="label">02 / Step 1 — Character in the Dark</div>
      <div class="iframe-wrap"><iframe src="slide-02.html"></iframe></div>
    </div>
    <div class="frame">
      <div class="label">03 / Step 2 — The Patience to Wait</div>
      <div class="iframe-wrap"><iframe src="slide-03.html"></iframe></div>
    </div>
    <div class="frame">
      <div class="label">04 / Step 3 — Faithfulness in Small Things</div>
      <div class="iframe-wrap"><iframe src="slide-04.html"></iframe></div>
    </div>
    <div class="frame">
      <div class="label">05 / Step 4 — Roots Before Reach</div>
      <div class="iframe-wrap"><iframe src="slide-05.html"></iframe></div>
    </div>
    <div class="frame">
      <div class="label">06 / CTA</div>
      <div class="iframe-wrap"><iframe src="slide-06.html"></iframe></div>
    </div>
  </div>
</body>
</html>

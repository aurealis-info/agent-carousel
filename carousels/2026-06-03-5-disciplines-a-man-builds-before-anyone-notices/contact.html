<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 Disciplines — Review Grid</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      background: #1a1a1a;
      font-family: -apple-system, sans-serif;
    }
    h1 {
      color: #d4b668;
      font-size: 18px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 24px 0;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .slide-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .slide-label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    iframe {
      width: 270px;
      height: 337px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      margin-bottom: -252px;
      margin-right: -810px;
      pointer-events: none;
    }
    .iframe-box {
      width: 270px;
      height: 337px;
      overflow: hidden;
      position: relative;
    }
    .iframe-box iframe {
      width: 1080px;
      height: 1350px;
      border: none;
      transform: scale(0.25);
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
  <h1>5 Disciplines — Review Grid (7 slides)</h1>
  <div class="grid">
    <div class="slide-wrap">
      <div class="iframe-box"><iframe src="slide-01.html"></iframe></div>
      <span class="slide-label">01 — Hook</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-box"><iframe src="slide-02.html"></iframe></div>
      <span class="slide-label">02 — Discipline 1</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-box"><iframe src="slide-03.html"></iframe></div>
      <span class="slide-label">03 — Discipline 2</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-box"><iframe src="slide-04.html"></iframe></div>
      <span class="slide-label">04 — Discipline 3</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-box"><iframe src="slide-05.html"></iframe></div>
      <span class="slide-label">05 — Discipline 4</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-box"><iframe src="slide-06.html"></iframe></div>
      <span class="slide-label">06 — Discipline 5</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-box"><iframe src="slide-07.html"></iframe></div>
      <span class="slide-label">07 — CTA</span>
    </div>
  </div>
</body>
</html>

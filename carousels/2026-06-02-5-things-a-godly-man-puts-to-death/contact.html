<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Review Grid — 5 Things a Godly Man Puts to Death</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    h1 {
      color: #d4b668;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin: 0 0 24px 0;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .frame {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    iframe {
      width: 270px;
      height: 337.5px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      width: 1080px;
      height: 1350px;
      pointer-events: none;
    }
    .frame-wrap {
      width: 270px;
      height: 337.5px;
      overflow: hidden;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <h1>Review — 5 Things a Godly Man Puts to Death</h1>
  <div class="grid">
    <div class="frame">
      <div class="label">01 / Hook</div>
      <div class="frame-wrap">
        <iframe src="slide-01.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">02 / Thing 1</div>
      <div class="frame-wrap">
        <iframe src="slide-02.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">03 / Thing 2</div>
      <div class="frame-wrap">
        <iframe src="slide-03.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">04 / Thing 3</div>
      <div class="frame-wrap">
        <iframe src="slide-04.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">05 / Thing 4</div>
      <div class="frame-wrap">
        <iframe src="slide-05.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">06 / Thing 5</div>
      <div class="frame-wrap">
        <iframe src="slide-06.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="frame">
      <div class="label">07 / CTA</div>
      <div class="frame-wrap">
        <iframe src="slide-07.html" scrolling="no"></iframe>
      </div>
    </div>
  </div>
</body>
</html>

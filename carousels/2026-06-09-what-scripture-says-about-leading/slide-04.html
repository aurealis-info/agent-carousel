    <h2 class="step-title">He shows up when it costs him.</h2>
    <p class="step-body">The man everyone trusts isn't the one with the sharpest words. He's the one who showed up at the hard moment — the hospital, the wreckage, the phone call nobody else made — because the people he leads needed him there. Presence under cost is the proof.</p>

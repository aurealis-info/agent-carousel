<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Confident and Humble — Review</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    h1 {
      color: #d4b668;
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin: 0 0 24px 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .slide-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .slide-label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    iframe {
      width: 100%;
      aspect-ratio: 1080 / 1350;
      border: 1px solid #333;
      transform-origin: top left;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>Confident and Humble &mdash; Review</h1>
  <div class="grid">
    <div class="slide-wrap">
      <div class="slide-label">01 / Hook</div>
      <iframe src="slide-01.html" scrolling="no"></iframe>
    </div>
    <div class="slide-wrap">
      <div class="slide-label">02 / Step 1</div>
      <iframe src="slide-02.html" scrolling="no"></iframe>
    </div>
    <div class="slide-wrap">
      <div class="slide-label">03 / Step 2</div>
      <iframe src="slide-03.html" scrolling="no"></iframe>
    </div>
    <div class="slide-wrap">
      <div class="slide-label">04 / Step 3</div>
      <iframe src="slide-04.html" scrolling="no"></iframe>
    </div>
    <div class="slide-wrap">
      <div class="slide-label">05 / Step 4</div>
      <iframe src="slide-05.html" scrolling="no"></iframe>
    </div>
    <div class="slide-wrap">
      <div class="slide-label">06 / CTA</div>
      <iframe src="slide-06.html" scrolling="no"></iframe>
    </div>
  </div>
</body>
</html>

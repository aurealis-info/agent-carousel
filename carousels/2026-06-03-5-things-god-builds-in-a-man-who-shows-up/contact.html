<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — 5 Things God Builds in a Man Who Shows Up — Review Grid</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; padding: 32px; font-family: sans-serif; }
    h1 { color: #d4b668; font-size: 16px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .slide-wrap { display: flex; flex-direction: column; gap: 8px; }
    .slide-wrap span { color: #888; font-size: 11px; text-align: center; }
    iframe {
      width: 270px;
      height: 337px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      display: block;
    }
    .iframe-clip {
      width: 270px;
      height: 337px;
      overflow: hidden;
      position: relative;
    }
    .iframe-clip iframe {
      width: 1080px;
      height: 1350px;
      transform: scale(0.25);
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <h1>Review — 5 Things God Builds in a Man Who Shows Up</h1>
  <div class="grid">
    <div class="slide-wrap">
      <div class="iframe-clip"><iframe src="slide-01.html" scrolling="no"></iframe></div>
      <span>01 / 07 — Hook</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-clip"><iframe src="slide-02.html" scrolling="no"></iframe></div>
      <span>02 / 07 — Thing 1</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-clip"><iframe src="slide-03.html" scrolling="no"></iframe></div>
      <span>03 / 07 — Thing 2</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-clip"><iframe src="slide-04.html" scrolling="no"></iframe></div>
      <span>04 / 07 — Thing 3</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-clip"><iframe src="slide-05.html" scrolling="no"></iframe></div>
      <span>05 / 07 — Thing 4</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-clip"><iframe src="slide-06.html" scrolling="no"></iframe></div>
      <span>06 / 07 — Thing 5</span>
    </div>
    <div class="slide-wrap">
      <div class="iframe-clip"><iframe src="slide-07.html" scrolling="no"></iframe></div>
      <span>07 / 07 — CTA</span>
    </div>
  </div>
</body>
</html>

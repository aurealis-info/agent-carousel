<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ETHOS — Review Grid — 5 traits of a man who leads like Christ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    }
    h1 {
      color: #d4b668;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 32px 0;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .cell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    .label {
      color: #888;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    iframe {
      width: 270px;
      height: 337px;
      border: 1px solid #333;
      transform-origin: top left;
      transform: scale(0.25);
      margin-bottom: -252px;
    }
    .wrapper {
      width: 270px;
      height: 85px;
      overflow: hidden;
      position: relative;
    }
  </style>
</head>
<body>
  <h1>Review — 5 traits of a man who leads like Christ — 7 slides</h1>
  <div class="grid">
    <div class="cell">
      <div class="label">01 / Hook</div>
      <div class="wrapper">
        <iframe src="slide-01.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">02 / Trait 1</div>
      <div class="wrapper">
        <iframe src="slide-02.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">03 / Trait 2</div>
      <div class="wrapper">
        <iframe src="slide-03.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">04 / Trait 3</div>
      <div class="wrapper">
        <iframe src="slide-04.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">05 / Trait 4</div>
      <div class="wrapper">
        <iframe src="slide-05.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">06 / Trait 5</div>
      <div class="wrapper">
        <iframe src="slide-06.html" scrolling="no"></iframe>
      </div>
    </div>
    <div class="cell">
      <div class="label">07 / CTA</div>
      <div class="wrapper">
        <iframe src="slide-07.html" scrolling="no"></iframe>
      </div>
    </div>
  </div>
</body>
</html>

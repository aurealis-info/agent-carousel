    <h2 class="step-title">Replace, don't just remove</h2>
    <div class="step-body">
      The phone fills every gap — the 30-second wait, the quiet before sleep, the moment between tasks.<br><br>
      If you remove it and leave those gaps empty, the pull comes back fast.<br><br>
      Replace it with something that actually feeds you. The Word. A walk. Silence.

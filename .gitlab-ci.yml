stages:
  - render

variables:
  # Instruct Git to fetch all history so git diff operates correctly across commits
  GIT_DEPTH: "0"

# Cache node_modules to speed up subsequent pipeline runs
cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm/
    - node_modules/

render-carousels:
  stage: render
  image: mcr.microsoft.com/playwright:v1.60.0-jammy
  before_script:
    # Set npm cache directory to be under the project root for GitLab caching
    - npm config set cache .npm/ --global
    - npm ci
  script:
    - npm run render
  only:
    - main
    - merge_requests
